version: "3.9"

services:
  api:
    build: .
    container_name: execution-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  postgres:
    image: postgres:16
    container_name: execution-postgres
    environment:
      POSTGRES_DB: execution_db
      POSTGRES_USER: execution_user
      POSTGRES_PASSWORD: execution_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: execution-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
